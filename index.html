<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台北陽明扶輪社 49週年</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2439 0%, #1a3a5c 40%, #234e78 100%);
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    /* 背景光暈 */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      left: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(201,168,76,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: rgba(255,252,248,0.97);
      border-radius: 20px;
      max-width: 400px;
      width: 100%;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(201,168,76,0.15);
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 頂部金線 */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #c9a84c, #e8d48b, #c9a84c, transparent);
      border-radius: 0 0 4px 4px;
    }

    .rotary-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      opacity: 0.6;
    }

    .rotary-icon svg { width: 100%; height: 100%; }

    .club-name {
      font-family: 'Noto Serif TC', serif;
      font-size: 20px;
      font-weight: 700;
      color: #1a3a5c;
      letter-spacing: 3px;
      margin-bottom: 4px;
    }

    .club-sub {
      font-size: 11px;
      color: #8b7355;
      letter-spacing: 2px;
      font-weight: 300;
      margin-bottom: 20px;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      margin: 0 auto 18px;
    }

    .event-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 16px;
      color: #3a3330;
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .motto-tag {
      display: inline-block;
      padding: 4px 16px;
      background: linear-gradient(135deg, rgba(26,58,92,0.06), rgba(201,168,76,0.1));
      border-radius: 16px;
      font-family: 'Noto Serif TC', serif;
      font-size: 12px;
      color: #c9a84c;
      letter-spacing: 3px;
      font-weight: 600;
      margin-bottom: 28px;
    }

    .lang-label {
      font-size: 12px;
      color: #8b7355;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .lang-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .lang-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      border: 1px solid rgba(26,58,92,0.12);
      border-radius: 12px;
      text-decoration: none;
      color: #1a3a5c;
      font-size: 15px;
      font-weight: 500;
      background: rgba(26,58,92,0.02);
      transition: all 0.25s ease;
    }

    .lang-btn:hover {
      background: #1a3a5c;
      color: #e8d48b;
      border-color: #1a3a5c;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(26,58,92,0.2);
    }

    .lang-btn .flag { font-size: 22px; }
    .lang-btn .arrow { opacity: 0.4; transition: opacity 0.25s; }
    .lang-btn:hover .arrow { opacity: 1; }

    .footer-note {
      margin-top: 24px;
      font-size: 10px;
      color: #aaa;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="rotary-icon">
    <svg viewBox="0 0 100 100" fill="#1a3a5c">
      <circle cx="50" cy="50" r="38" fill="none" stroke="#1a3a5c" stroke-width="5"/>
      <circle cx="50" cy="50" r="20" fill="none" stroke="#1a3a5c" stroke-width="3.5"/>
      <circle cx="50" cy="12" r="3.5"/><circle cx="83" cy="31" r="3.5"/>
      <circle cx="83" cy="69" r="3.5"/><circle cx="50" cy="88" r="3.5"/>
      <circle cx="17" cy="69" r="3.5"/><circle cx="17" cy="31" r="3.5"/>
    </svg>
  </div>

  <div class="club-name">台北陽明扶輪社</div>
  <div class="club-sub">ROTARY CLUB OF TAIPEI YANG MING</div>

  <div class="divider"></div>

  <div class="event-title">授證 49 週年紀念晚會<br>社長歡迎詞</div>
  <div class="motto-tag">陽明49 · 光耀永久</div>

  <div class="lang-label">— 請選擇語言 / Select Language —</div>

  <div class="lang-buttons">
    <a href="zh.html" class="lang-btn">
      <span class="flag">🇹🇼</span>
      <span>中文版</span>
      <span class="arrow">→</span>
    </a>
    <a href="ja.html" class="lang-btn">
      <span class="flag">🇯🇵</span>
      <span>日本語版</span>
      <span class="arrow">→</span>
    </a>
    <a href="en.html" class="lang-btn">
      <span class="flag">🇺🇸</span>
      <span>English</span>
      <span class="arrow">→</span>
    </a>
  </div>

  <div class="footer-note">EST. 1977 · 49TH ANNIVERSARY</div>
</div>

</body>
</html>
